kind = "web"
previewPath = "/"
title = "Amir Shop"
version = "1.0.0"
id = "artifacts/amir-shop"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20179

[services.development]
run = "pnpm --filter @workspace/amir-shop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/amir-shop", "run", "build" ]
serve = "static"
publicDir = "artifacts/amir-shop/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20179"
BASE_PATH = "/"
